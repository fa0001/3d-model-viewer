<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR 3D Model Viewer</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; }

      #camera-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 0;
      }
      #camera-bg video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      a-scene {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1;
      }

      /* Force the three.js canvas to be transparent */
      canvas {
        background: transparent !important;
      }
    </style>
  </head>
  <body>

    <!-- Layer 1: real camera -->
    <div id="camera-bg">
      <video id="cam" autoplay playsinline muted></video>
    </div>

    <!-- Layer 2: A-Frame on top with transparent background -->
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true;"
    >
      <a-assets>
        <a-asset-item id="dewaruci-model" src="dewaruci.glb"></a-asset-item>
      </a-assets>

      <a-gltf-model
        src="#dewaruci-model"
        scale="0.1 0.1 0.1"
        rotation="0 0 0"
        position="0 0 0"
        animation-mixer
      ></a-gltf-model>

      <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
      <a-light type="directional" position="2 4 2" intensity="2"></a-light>

      <a-camera
        position="0 0 0"
        look-controls="enabled: true"
        wasd-controls="enabled: false"
      ></a-camera>
    </a-scene>

    <script>
      // Force transparent background on the Three.js renderer
      AFRAME.registerComponent('transparent-bg', {
        init: function () {
          const renderer = this.el.renderer;
          renderer.setClearColor(0x000000, 0);
          renderer.setPixelRatio(window.devicePixelRatio);
        }
      });

      document.querySelector('a-scene').setAttribute('transparent-bg', '');

      // Start rear camera
      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      })
      .then(stream => {
        document.getElementById('cam').srcObject = stream;
      })
      .catch(err => {
        alert('Camera error: ' + err.message + '\nMake sure you are on HTTPS.');
      });
    </script>

  </body>
</html>
