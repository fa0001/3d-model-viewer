<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR 3D Model Viewer</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: transparent; }

      #ar-overlay {
        position: fixed;
        inset: 0;
        z-index: -1;
      }

      #ar-overlay video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>

    <!-- Real camera feed behind the A-Frame scene -->
    <div id="ar-overlay">
      <video id="camera-feed" autoplay playsinline muted></video>
    </div>

    <a-scene
      background="color: transparent"
      renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
    >
      <a-assets>
        <a-asset-item id="dewaruci-model" src="dewaruci.glb"></a-asset-item>
      </a-assets>

      <!-- 3D model floating in front of the camera -->
      <a-gltf-model
        src="#dewaruci-model"
        scale="0.05 0.05 0.05"
        rotation="0 -90 0"
        position="0 0 -1.5"
        animation-mixer
      ></a-gltf-model>

      <!-- Lighting -->
      <a-light type="ambient" intensity="1.2"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>

      <a-camera
        position="0 0 0"
        look-controls="enabled: true"
        wasd-controls="enabled: false"
      ></a-camera>

    </a-scene>

    <script>
      // Start rear camera feed
      async function startCamera() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
          });
          document.getElementById("camera-feed").srcObject = stream;
        } catch (err) {
          console.error("Camera error:", err);
          alert("Could not access camera. Please allow camera permission and use HTTPS.");
        }
      }

      startCamera();
    </script>

  </body>
</html>
