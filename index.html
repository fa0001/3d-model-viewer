<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>AR 3D Model Viewer</title>

    <!-- A-Frame core -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- AR.js for A-Frame (markerless, location, or marker-based AR) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- A-Frame Extras (animations, loaders, etc.) -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>

    <style>
      * { margin: 0; padding: 0; }
      body { overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <!-- Assets -->
      <a-assets>
        <a-asset-item id="dewaruci-model" src="dewaruci.glb"></a-asset-item>
      </a-assets>

      <!-- AR Marker: default 'hiro' pattern. Print or show on screen:
           https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png
           Replace type/url if you have a custom marker. -->
      <a-marker preset="hiro">
        <a-gltf-model
          src="#dewaruci-model"
          scale="0.05 0.05 0.05"
          rotation="0 -90 0"
          position="0 0 0"
          animation-mixer
        ></a-gltf-model>
      </a-marker>

      <!-- Camera -->
      <a-entity camera></a-entity>

    </a-scene>

  </body>
</html>
